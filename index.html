<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическое ценообразование</title>
    <!-- Подключаем необходимые библиотеки через CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
        }
        /* Кастомный ползунок в стиле Tailwind */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 99px;
            background: #2563eb;
            cursor: pointer;
            margin-top: -6px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Иконки Lucide в виде компонентов
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const INITIAL_DATA = [
            { id: 1, house: "1", flat: "1", rooms: 1, floor: 1, area: 35.7, basePrice: 110000, status: "Свободно" },
            { id: 2, house: "1", flat: "2", rooms: 2, floor: 1, area: 53.2, basePrice: 105000, status: "Продано" },
            { id: 3, house: "1", flat: "3", rooms: 3, floor: 1, area: 78.0, basePrice: 100000, status: "Свободно" },
            { id: 4, house: "1", flat: "10", rooms: 1, floor: 2, area: 35.5, basePrice: 115000, status: "Продано" },
            { id: 5, house: "2", flat: "101", rooms: 1, floor: 2, area: 35.4, basePrice: 115000, status: "Продано" },
            { id: 6, house: "2", flat: "102", rooms: 2, floor: 2, area: 52.3, basePrice: 112000, status: "Свободно" },
            { id: 7, house: "2", flat: "105", rooms: 1, floor: 3, area: 35.5, basePrice: 120000, status: "Свободно" },
            { id: 8, house: "2", flat: "106", rooms: 1, floor: 3, area: 35.4, basePrice: 120000, status: "Свободно" },
            { id: 9, house: "3", flat: "201", rooms: 3, floor: 4, area: 77.5, basePrice: 108000, status: "Свободно" },
            { id: 10, house: "3", flat: "202", rooms: 2, floor: 4, area: 51.0, basePrice: 115000, status: "Свободно" },
        ];

        function App() {
            const [threshold, setThreshold] = useState(20);
            const [increasePercent, setIncreasePercent] = useState(2);
            const [data] = useState(INITIAL_DATA);

            const stats = useMemo(() => {
                const total = data.length;
                const sold = data.filter(d => d.status === "Продано").length;
                const soldPercent = (sold / total) * 100;
                
                const roomsStats = data.reduce((acc, curr) => {
                    if (!acc[curr.rooms]) acc[curr.rooms] = { total: 0, sold: 0 };
                    acc[curr.rooms].total++;
                    if (curr.status === "Продано") acc[curr.rooms].sold++;
                    return acc;
                }, {});

                return { total, sold, soldPercent, roomsStats };
            }, [data]);

            const calculatedData = useMemo(() => {
                return data.map(item => {
                    let recommendation = "без изменений";
                    let newPricePerMeter = item.basePrice;
                    let reason = "стабильный спрос";

                    if (item.status === "Продано") {
                        const baseTotal = Math.round(item.area * item.basePrice);
                        return { 
                            ...item, 
                            currentPrice: item.basePrice, 
                            baseTotal,
                            currentTotal: baseTotal,
                            recommendation: "реализовано", 
                            reason: "лот продан" 
                        };
                    }

                    const roomStat = stats.roomsStats[item.rooms];
                    const roomSoldPercent = (roomStat.sold / roomStat.total) * 100;

                    if (roomSoldPercent >= threshold) {
                        newPricePerMeter = item.basePrice * (1 + increasePercent / 100);
                        recommendation = `повысить на ${increasePercent}%`;
                        reason = `дефицит ${item.rooms}-комнатных (продано ${Math.round(roomSoldPercent)}%)`;
                    } else if (stats.soldPercent > 15) {
                        newPricePerMeter = item.basePrice * (1 + (increasePercent / 2) / 100);
                        recommendation = `повысить на ${increasePercent / 2}%`;
                        reason = "высокий общий темп продаж ЖК";
                    }

                    const baseTotal = Math.round(item.area * item.basePrice);
                    const currentTotal = Math.round(item.area * newPricePerMeter);

                    return { 
                        ...item, 
                        currentPrice: Math.round(newPricePerMeter), 
                        baseTotal,
                        currentTotal,
                        recommendation, 
                        reason 
                    };
                });
            }, [data, threshold, increasePercent, stats]);

            const handleExport = () => {
                const headers = ["Дом", "№ кв", "Комнат", "Этаж", "S, м2", "Цена м2 (база)", "Цена м2 (новая)", "Итого (база)", "Итого (новая)", "Рекомендация", "Причина"];
                const rows = calculatedData.map(d => [
                    d.house, d.flat, d.rooms, d.floor, d.area, d.basePrice, d.currentPrice, d.baseTotal, d.currentTotal, d.recommendation, d.reason
                ]);
                const content = [headers, ...rows].map(e => e.join(";")).join("\n");
                const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `pricing_report_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            return (
                <div className="p-4 md:p-8 max-w-[1600px] mx-auto">
                    {/* Header */}
                    <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 no-print text-left">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <Icon name="building-2" size={28} className="text-blue-600" />
                                <h1 className="text-2xl font-bold tracking-tight">Динамическое ценообразование</h1>
                            </div>
                            <p className="text-slate-500 font-medium text-sm">система управления доходностью жилой недвижимости</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.print()} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-xl hover:bg-slate-50 transition-colors shadow-sm text-sm font-semibold">
                                <Icon name="printer" size={16} /> Печать
                            </button>
                            <button onClick={handleExport} className="flex items-center gap-2 bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition-colors shadow-md shadow-blue-100 text-sm font-semibold">
                                <Icon name="download" size={16} /> Excel
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
                        {/* Sidebar */}
                        <aside className="lg:col-span-1 space-y-6 no-print">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <div className="flex items-center gap-2 mb-6 font-bold text-slate-700 text-sm uppercase tracking-wider">
                                    <Icon name="settings-2" size={18} className="text-blue-500" />
                                    <h2>Настройки модели</h2>
                                </div>
                                <div className="space-y-8">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-3 text-left">
                                            порог продаж: {threshold}%
                                        </label>
                                        <input type="range" min="5" max="80" step="5" value={threshold} onChange={(e) => setThreshold(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                        <p className="text-[10px] text-slate-400 mt-3 leading-relaxed text-left italic">
                                            * повышение цены происходит при реализации указанного объема в категории
                                        </p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-3 text-left">
                                            шаг повышения: {increasePercent}%
                                        </label>
                                        <input type="range" min="0.5" max="10" step="0.5" value={increasePercent} onChange={(e) => setIncreasePercent(parseFloat(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                    </div>
                                </div>
                            </div>
                            <div className="bg-blue-600 p-6 rounded-2xl text-white shadow-xl shadow-blue-200 relative overflow-hidden">
                                <div className="relative z-10 text-left text-white">
                                    <h3 className="font-bold mb-1 opacity-90 text-xs uppercase tracking-widest text-white">Текущий статус</h3>
                                    <div className="text-4xl font-black mb-1">{stats.soldPercent.toFixed(1)}%</div>
                                    <p className="text-xs opacity-80 mb-5 font-medium">объема фонда реализовано</p>
                                    <div className="w-full bg-white/20 h-2 rounded-full overflow-hidden">
                                        <div className="bg-white h-full transition-all duration-700" style={{ width: `${stats.soldPercent}%` }}></div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Main Table */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-bold text-lg text-slate-800">Реестр лотов и рекомендации</h2>
                                    <span className="bg-slate-50 text-slate-500 text-[10px] px-3 py-1 rounded-full font-bold border border-slate-100 uppercase">
                                        {calculatedData.length} позиций
                                    </span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                                            <tr>
                                                <th className="px-6 py-4">Дом</th>
                                                <th className="px-6 py-4">Лот / Тип</th>
                                                <th className="px-6 py-4 text-center">Этаж</th>
                                                <th className="px-6 py-4">S, м²</th>
                                                <th className="px-6 py-4">Цена м² (база)</th>
                                                <th className="px-6 py-4">Цена м² (новая)</th>
                                                <th className="px-6 py-4">Итого (база)</th>
                                                <th className="px-6 py-4">Итого (новая)</th>
                                                <th className="px-6 py-4">Рекомендация</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 text-[13px]">
                                            {calculatedData.map(item => (
                                                <tr key={item.id} className={`${item.status === 'Продано' ? 'bg-slate-50/50 opacity-60' : 'hover:bg-blue-50/30'}`}>
                                                    <td className="px-6 py-4 font-bold text-blue-600">Д{item.house}</td>
                                                    <td className="px-6 py-4">
                                                        <div className="font-bold text-slate-800 uppercase text-[14px]">кв. {item.flat}</div>
                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{item.rooms}-комн.</div>
                                                    </td>
                                                    <td className="px-6 py-4 text-center text-slate-600 font-semibold">{item.floor}</td>
                                                    <td className="px-6 py-4 font-bold text-slate-700">{item.area}</td>
                                                    <td className="px-6 py-4 text-slate-400 text-xs">
                                                        {item.basePrice.toLocaleString()} ₽
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className={`font-bold ${item.currentPrice > item.basePrice ? 'text-green-600' : 'text-slate-800'}`}>
                                                            {item.currentPrice.toLocaleString()} ₽
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-slate-400 text-xs">
                                                        {item.baseTotal.toLocaleString()} ₽
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className={`font-bold ${item.currentTotal > item.baseTotal ? 'text-green-600' : 'text-slate-800'}`}>
                                                            {item.currentTotal.toLocaleString()} ₽
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex flex-col gap-1">
                                                            <span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter w-fit ${
                                                                item.status === 'Продано' ? 'bg-slate-200 text-slate-500' : 
                                                                item.currentPrice > item.basePrice ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'
                                                            }`}>
                                                                {item.recommendation}
                                                            </span>
                                                            <span className="text-[10px] text-slate-400 font-medium leading-none">
                                                                {item.reason}
                                                            </span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            {/* Info Blocks */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 no-print text-left">
                                <div className="bg-amber-50/50 border border-amber-100 p-5 rounded-2xl flex gap-4 text-left">
                                    <Icon name="alert-circle" className="text-amber-500 shrink-0" size={24} />
                                    <div>
                                        <h4 className="font-bold text-amber-900 text-xs uppercase mb-1">внимание: контроль темпа</h4>
                                        <p className="text-xs text-amber-800 font-medium leading-relaxed opacity-80 text-left">
                                            при остановке бронирований после повышения цен рекомендуется временная фиксация прайса на 14 календарных дней.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-emerald-50/50 border border-emerald-100 p-5 rounded-2xl flex gap-4 text-left">
                                    <Icon name="check-circle-2" className="text-emerald-500 shrink-0" size={24} />
                                    <div>
                                        <h4 className="font-bold text-emerald-900 text-xs uppercase mb-1">оптимизация доходности</h4>
                                        <p className="text-xs text-emerald-800 font-medium leading-relaxed opacity-80 text-left">
                                            выбранная стратегия увеличивает плановую выручку проекта за счет управления дефицитными лотами.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer className="mt-16 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] no-print border-t border-slate-100 pt-10 pb-6">
                        конфиденциально - система динамического ценообразования
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
